    <!-- Remote Update System -->
    <script>
        // App Version Management
        const APP_CONFIG = {
            VERSION: '2.2.1',
            UPDATE_CHECK_INTERVAL: 60000,
            AUTO_UPDATE_ENABLED: true
        };

        // Remote Update System
        const updateSystem = {
            currentVersion: APP_CONFIG.VERSION,
            latestVersion: null,
            updateAvailable: false,
            updateData: null,
            
            async checkForUpdates() {
                try {
                    const updateManifest = this.getUpdateManifest();
                    
                    if (updateManifest && updateManifest.version !== this.currentVersion) {
                        this.latestVersion = updateManifest.version;
                        this.updateAvailable = true;
                        this.updateData = updateManifest;
                        this.showUpdateNotification(updateManifest);
                        console.log(`📱 Update available: ${this.currentVersion} → ${updateManifest.version}`);
                        return true;
                    }
                    return false;
                } catch (error) {
                    console.error('Update check failed:', error);
                    return false;
                }
            },
            
            getUpdateManifest() {
                const savedManifest = localStorage.getItem('updateManifest');
                if (savedManifest) {
                    try {
                        return JSON.parse(savedManifest);
                    } catch (e) {
                        console.error('Invalid update manifest');
                    }
                }
                return null;
            },
            
            showUpdateNotification(manifest) {
                const notification = document.createElement('div');
                notification.className = 'update-notification';
                notification.innerHTML = `
                    <div class="update-content">
                        <div class="update-icon">📱</div>
                        <div class="update-info">
                            <h3>Update Available</h3>
                            <p>Version ${manifest.version} is ready to install</p>
                            <p class="update-description">${manifest.description || 'New features and improvements available'}</p>
                        </div>
                        <div class="update-actions">
                            <button onclick="updateSystem.installUpdate()" class="btn-update">Update Now</button>
                            <button onclick="updateSystem.dismissUpdate()" class="btn-dismiss">Later</button>
                        </div>
                    </div>
                `;
                
                document.body.appendChild(notification);
                
                if (manifest.mandatory) {
                    setTimeout(() => {
                        notification.classList.add('show');
                    }, 3000);
                } else {
                    notification.classList.add('show');
                }
            },
            
            async installUpdate() {
                try {
                    const updateBtn = document.querySelector('.btn-update');
                    updateBtn.textContent = 'Installing...';
                    updateBtn.disabled = true;
                    
                    await this.simulateUpdateInstallation();
                    this.showUpdateSuccess();
                    
                    setTimeout(() => {
                        window.location.reload();
                    }, 2000);
                    
                } catch (error) {
                    console.error('Update installation failed:', error);
                    this.showUpdateError();
                }
            },
            
            async simulateUpdateInstallation() {
                return new Promise((resolve) => {
                    setTimeout(() => {
                        localStorage.setItem('lastUpdateCheck', Date.now().toString());
                        localStorage.setItem('appVersion', this.updateData.version);
                        resolve();
                    }, 2000);
                });
            },
            
            dismissUpdate() {
                const notification = document.querySelector('.update-notification');
                if (notification) {
                    notification.remove();
                }
                
                if (!this.updateData.mandatory) {
                    setTimeout(() => {
                        this.checkForUpdates();
                    }, 30 * 60 * 1000);
                }
            },
            
            showUpdateSuccess() {
                const notification = document.querySelector('.update-notification');
                if (notification) {
                    notification.innerHTML = `
                        <div class="update-success">
                            <div class="success-icon">✅</div>
                            <h3>Update Successful!</h3>
                            <p>Restarting application...</p>
                        </div>
                    `;
                    notification.classList.add('success');
                }
            },
            
            showUpdateError() {
                const updateBtn = document.querySelector('.btn-update');
                if (updateBtn) {
                    updateBtn.textContent = 'Update Failed';
                    updateBtn.disabled = false;
                }
                
                console.error('Update installation failed. Please try again.');
            },
            
            startAutoUpdateCheck() {
                this.checkForUpdates();
                
                setInterval(() => {
                    this.checkForUpdates();
                }, APP_CONFIG.UPDATE_CHECK_INTERVAL);
            },
            
            manualUpdateCheck() {
                return this.checkForUpdates();
            }
        };

        // Password Management System
        const passwordManager = {
            passwords: {
                'adminLogin': '',
                'resellerLogin': '',
                'clientAdult': '112233',
                'masterAdult': '273972'
            },
            verifyPassword: function(key, input) {
                return this.passwords[key] === input;
            },
            authenticateUser: function(username, password) {
                // Load customer data from GitHub sync
                const customers = loadCustomersFromAdmin();
                
                // Find customer by username
                const customer = customers.find(c => c.username === username);
                
                // Check if customer exists and password matches
                if (customer && customer.password === password) {
                    // AUTOMATIC DEVICE LOCK - Silent Protection
                    // Generates unique device fingerprint and locks account to multiple devices based on subscription
                    // Basic TV = 1 device, 2nd TV = 2 devices, 3rd TV = 3 devices (same WiFi only)
                    
                    // Generate or get this device's unique fingerprint
                    let deviceFingerprint = localStorage.getItem('iwatch_device_fp');
                    if (!deviceFingerprint) {
                        // Create unique fingerprint based on device characteristics
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        ctx.textBaseline = 'top';
                        ctx.font = '14px Arial';
                        ctx.fillText('iWatch-TV-Fingerprint', 2, 2);
                        const canvasData = canvas.toDataURL();
                        
                        const fpData = [
                            navigator.userAgent,
                            navigator.language,
                            screen.width + 'x' + screen.height,
                            screen.colorDepth,
                            new Date().getTimezoneOffset(),
                            navigator.hardwareConcurrency || 'unknown',
                            canvasData.slice(-50),
                            Date.now().toString(36)
                        ].join('|');
                        
                        // Create hash of fingerprint
                        let hash = 0;
                        for (let i = 0; i < fpData.length; i++) {
                            const char = fpData.charCodeAt(i);
                            hash = ((hash << 5) - hash) + char;
                            hash = hash & hash;
                        }
                        deviceFingerprint = 'DFP_' + Math.abs(hash).toString(36) + '_' + Date.now().toString(36);
                        localStorage.setItem('iwatch_device_fp', deviceFingerprint);
                    }
                    
                    // Calculate max devices based on subscription - FIXED: Better detection
                    const plan = customer.plan || '';
                    let maxDevices = 1; // Default to 1 device (Basic TV)
                    
                    // FIXED: More flexible plan detection - handles various formats
                    const planLower = plan.toLowerCase();
                    const has2nd = planLower.includes('2nd') || planLower.includes('second') || planLower.includes('2nd tv');
                    const has3rd = planLower.includes('3rd') || planLower.includes('third') || planLower.includes('3rd tv');
                    
                    if (has2nd && has3rd) {
                        maxDevices = 3;
                    } else if (has2nd) {
                        maxDevices = 2;
                    }
                    
                    // Get stored devices (stored as comma-separated fingerprints)
                    const lockKey = 'iwatch_lock_' + customer.id;
                    const lockTimeKey = 'iwatch_locktime_' + customer.id;
                    let storedDevices = localStorage.getItem(lockKey) || '';
                    let deviceList = storedDevices ? storedDevices.split(',') : [];
                    const lockTime = parseInt(localStorage.getItem(lockTimeKey) || '0');
                    
                    // Check if admin requested device reset (new TV scenario)
                    if (customer.resetDeviceLock && customer.resetDeviceLock > lockTime) {
                        // Admin reset the device lock - clear old lock and allow new device
                        localStorage.removeItem(lockKey);
                        localStorage.removeItem(lockTimeKey);
                        storedDevices = '';
                        deviceList = [];
                        console.log('Device lock reset by admin');
                    }
                    
                    // Check if this device is already registered
                    if (deviceList.includes(deviceFingerprint)) {
                        // Device already registered - allow access
                        console.log('Device already registered, allowing access');
                    } else {
                        // New device - check if we can add it
                        if (deviceList.length >= maxDevices) {
                            // Maximum devices reached for this subscription
                            console.log('Maximum devices (' + maxDevices + ') reached for this subscription');
                            // FIXED: Show correct error message - Device Limit, not Expired
                            showDeviceLimitError(maxDevices);
                            return null;
                        } else {
                            // Add this device to the registered list
                            deviceList.push(deviceFingerprint);
                            localStorage.setItem(lockKey, deviceList.join(','));
                            localStorage.setItem(lockTimeKey, Date.now().toString());
                            console.log('New device registered. Total devices: ' + deviceList.length + '/' + maxDevices);
                        }
                    }
                    
                    // Check if customer has active subscription
                    if (customer.status === 'active') {
                        // Check if subscription is not expired
                        let isValid = true;
                        if (customer.expiryDate) {
                            const expiryDate = new Date(customer.expiryDate);
                            const today = new Date();
                            isValid = expiryDate > today || customer.expiryDate.includes('T') === false;
                        }
                        
                        if (isValid) {
                            // Build subscribedPackages based on customer's plan and addons
                            const subscribedPackages = [];
                            const plan = customer.plan || '';
                            const addons = customer.addons || '';
                            
                            // Map plan to package IDs
                            if (plan.includes('Basic')) {
                                subscribedPackages.push('basicTV');
                            }
                            if (plan.includes('Second')) {
                                subscribedPackages.push('secondTV');
                            }
                            if (plan.includes('Third')) {
                                subscribedPackages.push('thirdTV');
                            }
                            
                            // Map addons to package IDs
                            if (addons.includes('Sports')) {
                                subscribedPackages.push('sports');
                            }
                            if (addons.includes('Movies')) {
                                subscribedPackages.push('movies');
                            }
                            if (addons.includes('Premium')) {
                                subscribedPackages.push('premium');
                            }
                            if (addons.includes('International')) {
                                subscribedPackages.push('international');
                            }
                            if (addons.includes('Adult')) {
                                subscribedPackages.push('adult');
                            }
                            
                            // Return customer object with subscription info
                            return {
                                username: customer.username,
                                fullName: customer.name,
                                role: 'customer',
                                customerId: customer.id,
                                subscribedPackages: subscribedPackages,
                                subscriptionExpiry: customer.expiryDate,
                                permissions: ['basic_access'],
                                plan: customer.plan,
                                addons: customer.addons,
                                adultPassword: (customer.adultPassword && customer.adultPassword.trim() !== '') ? customer.adultPassword : '112233'
                            };
                        }
                    }
                }
                
                return null; // No authentication found
            }
        };

        // Cache Clearing Function - FIXED: Clear cache on login to ensure fresh data
        function clearClientCache() {
            console.log('🧹 Clearing client cache...');
            
            // Clear old cached data to ensure fresh data on login
            localStorage.removeItem('adminCustomers');
            localStorage.removeItem('adminPackages');
            localStorage.removeItem('packages');
            localStorage.removeItem('customers');
            localStorage.removeItem('contentData');
            localStorage.removeItem('lastSyncTime');
            
            // Clear Plex cache
            localStorage.removeItem('plexMovies');
            localStorage.removeItem('plexTVShows');
            localStorage.removeItem('plexServers');
            
            // Clear any stale device locks (optional - keeps some for legitimate users)
            // Only clear if we're doing a full refresh
            
            console.log('✅ Client cache cleared successfully');
        }

        // Show Device Limit Error - FIXED: Shows correct message
        function showDeviceLimitError(maxDevices) {
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.9);
                display: flex;
                justify-content: center;

            modal.innerHTML = `
                <div style="background: linear-gradient(135deg, #1a1a2e, #16213e); border: 2px solid #f44336; border-radius: 20px; padding: 40px; max-width: 500px; text-align: center;">
                    <div style="font-size: 80px; margin-bottom: 20px;">📺</div>

                        Your subscription allows <strong style="color: #ff9800;">${maxDevices} device${maxDevices > 1 ? 's' : ''}</strong> maximum.
                    </p>
                    <p style="color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 30px;">
                        To add a new device, please contact your administrator to reset your device authorization.

                    <button onclick="this.closest('div').parentElement.remove()" style="background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 12px 30px; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: 600;">
                        Close
                    </button>
                </div>
            `;
            
            document.body.appendChild(modal);
            console.log('📺 Device limit error shown: ' + maxDevices + ' devices max');
        }
    </script>

            try {

                        localStorage.setItem('adminCustomers', JSON.stringify(customersData));

            };
            
            localStorage.setItem('contentData', JSON.stringify(contentData));
        }
        
        // Setup Event Listeners
        function setupEventListeners() {
            // Login Form
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            
            // Source Tabs
            document.querySelectorAll('.source-tab').forEach(tab => {
                tab.addEventListener('click', (e) => {
                    switchSource(e.target.dataset.source);
                });
            });
            
            // Search Input
            document.getElementById('searchInput').addEventListener('input', handleSearch);
            
            // Keyboard Navigation
            document.addEventListener('keydown', handleKeyboardNav);
            
            // Update Time Display
            updateTimeDisplay();
            setInterval(updateTimeDisplay, 1000);
        }
        
        // Handle Login
        function handleLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            console.log('🔐 Attempting login for:', username);
            
            // Clear cache before login to ensure fresh data
            clearClientCache();
            
            // Authenticate user
            const user = passwordManager.authenticateUser(username, password);
            
            if (user) {
                currentUser = user;
                showApp();
                console.log('✅ Login successful:', username);
            } else {
                showNotification('❌ Invalid username or password', 'error');
                console.log('❌ Login failed for:', username);
            }
        }
        
        // Show Main App
        function showApp() {
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            
            // Update user info
            document.getElementById('userName').textContent = currentUser.fullName;
            
            // Update subscription expiry
            updateSubscriptionDisplay();
            
            // Load content
            loadContentForSource(currentSource);
            
            // Show logout button
            document.getElementById('logoutBtn').classList.add('show');
        }
        
        // Update Subscription Display
        function updateSubscriptionDisplay() {
            const expiryElement = document.getElementById('subscriptionExpiry');
            const expiryDate = new Date(currentUser.subscriptionExpiry);
            const today = new Date();
            
            if (expiryDate > today) {
                const daysLeft = Math.ceil((expiryDate - today) / (1000 * 60 * 60 * 24));
                expiryElement.textContent = `${daysLeft} days left`;
                expiryElement.className = 'subscription-expiry';
            } else {
                expiryElement.textContent = 'Expired';
                expiryElement.className = 'subscription-expiry expired';
            }
        }
        
        // Switch Source
        function switchSource(source) {
            currentSource = source;
            
            // Update active tab
            document.querySelectorAll('.source-tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.dataset.source === source) {
                    tab.classList.add('active');
                }
            });
            
            // Load content
            loadContentForSource(source);
        }
        
        // Load Content for Source
        function loadContentForSource(source) {
            const contentList = document.getElementById('contentList');
            const content = contentData[source]?.content || [];
            
            if (content.length === 0) {
                contentList.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: rgba(255,255,255,0.5);">
                        No content available for ${source}
                    </div>
                `;
                return;
            }
            
            // Build content items HTML
            let html = '';
            content.forEach(item => {
                const badgeClass = item.type === 'live' ? 'badge-live' : 'badge-movies';
                html += `
                    <div class="content-item" onclick="playContent('${item.id}')">
                        <span class="content-type-badge ${badgeClass}">${item.type.toUpperCase()}</span>
                        <div class="content-header">
                            <div class="content-icon">${item.type === 'live' ? '📡' : '🎬'}</div>
                            <div class="content-info">
                                <div class="content-name">${item.name}</div>
                                <div class="content-description">${item.description}</div>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            contentList.innerHTML = html;
        }
        
        // Play Content
        function playContent(contentId) {
            // Find content item
            let item = null;
            for (const source in contentData) {
                const found = contentData[source].content.find(c => c.id === contentId);
                if (found) {
                    item = found;
                    break;
                }
            }
            
            if (!item) {
                console.error('Content not found:', contentId);
                return;
            }
            
            currentContent = item;
            
            // Update now playing
            document.getElementById('nowPlaying').style.display = 'block';
            document.getElementById('nowPlayingTitle').textContent = item.name;
            document.getElementById('nowPlayingMeta').textContent = `${item.type === 'live' ? 'Live TV' : 'VOD'} • HD`;
            
            // Hide overlay
            document.getElementById('videoOverlay').classList.remove('show');
            
            // Load stream
            if (item.url) {
                loadStream(item.url);
            } else {
                showNotification('⚠️ No stream URL configured for this content', 'warning');
            }
            
            // Update content item styling
            document.querySelectorAll('.content-item').forEach(el => el.classList.remove('now-playing'));
            event.target.closest('.content-item').classList.add('now-playing');
        }
        
        // Load Stream
        function loadStream(url) {
            const videoElement = document.getElementById('videoPlayer');
            
            if (url.includes('.m3u8') || url.includes('hls')) {
                if (Hls.isSupported()) {
                    if (hls) {
                        hls.destroy();
                    }
                    
                    hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(videoElement);
                    
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        videoElement.play();
                    });
                } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                    videoElement.src = url;
                    videoElement.play();
                }
            } else {
                videoElement.src = url;
                videoElement.play();
            }
        }
        
        // Stop Stream
        function stopStream() {
            const videoElement = document.getElementById('videoPlayer');
            videoElement.pause();
            videoElement.src = '';
            
            document.getElementById('videoOverlay').classList.add('show');
            document.getElementById('nowPlaying').style.display = 'none';
            
            document.querySelectorAll('.content-item').forEach(el => el.classList.remove('now-playing'));
        }
        
        // Toggle Fullscreen
        function toggleFullscreen() {
            const videoElement = document.getElementById('videoPlayer');
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                videoElement.requestFullscreen();
            }
        }
        
        // Set Volume
        function setVolume(value) {
            const videoElement = document.getElementById('videoPlayer');
            videoElement.volume = value / 100;
        }
        
        // Handle Search
        function handleSearch(e) {
            const query = e.target.value.toLowerCase();
            const contentList = document.getElementById('contentList');
            const items = contentList.querySelectorAll('.content-item');
            
            items.forEach(item => {
                const name = item.querySelector('.content-name').textContent.toLowerCase();
                if (name.includes(query)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }
        
        // Handle Keyboard Navigation
        function handleKeyboardNav(e) {
            // TV Remote Navigation
            switch(e.key) {
                case 'ArrowUp':
                case 'ArrowDown':
                case 'ArrowLeft':
                case 'ArrowRight':
                    // Navigate between content items
                    break;
                case 'Enter':
                    // Play focused content
                    break;
                case 'Escape':
                case 'Backspace':
                    stopStream();
                    break;
            }
        }
        
        // Handle Logout
        function handleLogout() {
            currentUser = null;
            currentContent = null;
            
            document.getElementById('appContainer').style.display = 'none';
            document.getElementById('loginModal').style.display = 'flex';
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            
            stopStream();
            
            console.log('👋 Logged out');
        }
        
        // Check Existing Login
        function checkExistingLogin() {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                try {
                    const user = JSON.parse(savedUser);
                    if (user && user.username) {
                        currentUser = user;
                        showApp();
                    }
                } catch (error) {
                    console.log('No saved user found');
                }
            }
        }
        
        // Update Time Display
        function updateTimeDisplay() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            const dateStr = now.toLocaleDateString('en-US', { month: '2-digit', day: '2-digit', year: 'numeric' });
            
            document.getElementById('currentTime').textContent = timeStr;
            document.getElementById('currentDate').textContent = dateStr;
        }
        
        // Show Notification
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: ${type === 'error' ? '#f44336' : type === 'success' ? '#4caf50' : '#2196f3'};
                color: white;
                padding: 15px 25px;
                border-radius: 10px;
                z-index: 10001;
                animation: slideIn 0.3s ease;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }
        
        // Initialize when DOM is ready
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
